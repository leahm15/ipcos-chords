<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPCOS Chords</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12211D;
    --surface: #1B2E27;
    --surface-alt: #223A31;
    --ink: #EDE6D6;
    --ink-dim: #A9B8AE;
    --gold: #D4AF6A;
    --gold-dim: rgba(212,175,106,0.16);
    --line: rgba(237,230,214,0.12);
    --danger: #C1666B;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at top, #16281f 0%, var(--bg) 55%);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background: var(--gold-dim); }
  button{ font-family:inherit; cursor:pointer; }
  input, textarea, select{ font-family:inherit; }
  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }

  .app{ max-width: 720px; margin: 0 auto; padding: 28px 20px 80px; }

  /* ---------- Header ---------- */
  .brand{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; }
  .brand h1{
    font-family:'Fraunces', serif; font-weight:600; font-size: 30px;
    letter-spacing:-0.01em; margin:0; color: var(--ink);
  }
  .brand h1 .amp{ color: var(--gold); font-style: italic; font-weight:500; }
  .brand .tag{ font-size:12px; color:var(--ink-dim); letter-spacing:0.06em; text-transform:uppercase; }
  .brand .tag[data-mode="cloud"]{ color:var(--gold); }
  .brand .tag[data-mode="local"]{ color:var(--danger); }

  /* ---------- Search + add row ---------- */
  .toolbar{ display:flex; gap:10px; margin-bottom:20px; }
  .search-wrap{ position:relative; flex:1; }
  .search-wrap input{
    width:100%; background: var(--surface); border:1px solid var(--line);
    color: var(--ink); border-radius: 999px; padding:11px 16px 11px 38px;
    font-size:14px; outline:none;
  }
  .search-wrap input:focus{ border-color: var(--gold); }
  .search-wrap svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:0.55; }
  .btn-gold{
    background: var(--gold); color:#1B2E27; border:none; border-radius:999px;
    padding:0 18px; font-size:14px; font-weight:600; white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .btn-gold:active{ transform: scale(0.97); }

  /* ---------- Sunday set list ---------- */
  .setlist-section{
    background:linear-gradient(145deg, rgba(212,175,106,0.12), rgba(27,46,39,0.96));
    border:1px solid rgba(212,175,106,0.34); border-radius:18px;
    padding:17px; margin-bottom:24px;
  }
  .setlist-header{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:13px; }
  .setlist-heading h2{ font-family:'Fraunces', serif; font-size:21px; line-height:1.1; margin:0 0 4px; }
  .setlist-date{ color:var(--gold); font-family:'JetBrains Mono', monospace; font-size:11px; }
  .setlist-clear{
    background:none; border:none; color:var(--ink-dim); font-size:12px; padding:3px 0;
    text-decoration:underline; text-underline-offset:3px;
  }
  .setlist-add{ display:flex; gap:8px; margin-bottom:13px; }
  .setlist-add input{
    min-width:0; flex:1; background:rgba(18,33,29,0.82); border:1px solid var(--line);
    color:var(--ink); border-radius:10px; padding:10px 12px; font-size:13px; outline:none;
  }
  .setlist-add input:focus{ border-color:var(--gold); }
  .setlist-add button{
    background:var(--gold); border:none; color:#1B2E27; border-radius:10px;
    padding:0 14px; font-weight:700; font-size:13px; white-space:nowrap;
  }
  .setlist-add button:disabled{ opacity:0.45; cursor:not-allowed; }
  .setlist-items{ display:flex; flex-direction:column; gap:7px; }
  .setlist-item{
    display:flex; align-items:center; gap:9px; background:rgba(18,33,29,0.58);
    border:1px solid var(--line); border-radius:11px; padding:8px 9px;
  }
  .setlist-order{
    width:25px; height:25px; border-radius:7px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; background:var(--gold-dim); color:var(--gold);
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700;
  }
  .setlist-song{ min-width:0; flex:1; cursor:pointer; padding:2px 0; }
  .setlist-song strong{
    display:block; font-family:'Fraunces', serif; font-size:15px; line-height:1.2;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .setlist-song span{ display:block; color:var(--ink-dim); font-size:11px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .setlist-key{ font-family:'JetBrains Mono', monospace; color:var(--gold); font-size:11px; flex-shrink:0; }
  .setlist-controls{ display:flex; gap:3px; flex-shrink:0; }
  .setlist-control{
    width:27px; height:27px; border-radius:7px; border:none; background:transparent;
    color:var(--ink-dim); display:flex; align-items:center; justify-content:center; padding:0;
  }
  .setlist-control:hover{ background:var(--surface-alt); color:var(--ink); }
  .setlist-control.remove:hover{ color:var(--danger); }
  .setlist-control:disabled{ opacity:0.25; cursor:default; background:transparent; }
  .setlist-empty{ color:var(--ink-dim); font-size:12.5px; line-height:1.5; padding:5px 2px 2px; }

  /* ---------- Continuous set-list view ---------- */
  .continuous-topbar{
    margin:-8px -8px 10px; padding:8px;
    background:linear-gradient(to bottom, rgba(18,33,29,0.99) 84%, rgba(18,33,29,0));
  }
  .continuous-sticky-nav{
    position:sticky; top:0; z-index:20; margin:0 -8px 24px; padding:8px;
    background:linear-gradient(to bottom, rgba(18,33,29,0.99) 90%, rgba(18,33,29,0.96));
    border-bottom:1px solid rgba(237,230,214,0.08);
    box-shadow:0 8px 18px rgba(6,12,10,0.18);
  }
  .continuous-topbar-row{ display:flex; align-items:center; gap:10px; }
  .continuous-title{ min-width:0; flex:1; }
  .continuous-title strong{ display:block; font-family:'Fraunces', serif; font-size:15px; }
  .continuous-title span{ display:block; color:var(--gold); font-family:'JetBrains Mono', monospace; font-size:10px; margin-top:1px; }
  .continuous-chord-toggle{
    background:var(--surface); border:1px solid var(--line); color:var(--ink-dim);
    border-radius:10px; min-height:38px; padding:0 11px; font-size:12px; white-space:nowrap;
  }
  .continuous-chord-toggle.on{ color:var(--gold); border-color:var(--gold); background:var(--gold-dim); }
  .continuous-intro{ margin-bottom:28px; }
  .continuous-intro h1{ font-family:'Fraunces', serif; font-size:29px; margin:0 0 5px; }
  .continuous-intro p{ color:var(--ink-dim); font-size:13px; line-height:1.5; margin:0; }
  .set-song-page{ scroll-margin-top:150px; padding:4px 0 54px; margin-bottom:46px; border-bottom:1px solid var(--line); }
  .set-song-page:last-child{ border-bottom:none; margin-bottom:0; padding-bottom:20px; }
  .set-song-position{
    display:inline-flex; align-items:center; gap:7px; color:var(--gold);
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.07em;
    text-transform:uppercase; margin-bottom:8px;
  }
  .set-song-position::before{ content:''; width:20px; height:1px; background:var(--gold); opacity:0.65; }
  .set-song-next{ color:var(--ink-dim); font-size:12px; margin-top:34px; padding-top:13px; border-top:1px dashed var(--line); }
  .set-song-next strong{ color:var(--gold); font-weight:600; }
  .transition-card{
    margin-top:38px; padding:16px 17px; border:1px solid rgba(212,175,106,0.3);
    border-radius:var(--radius); background:linear-gradient(135deg, var(--gold-dim), rgba(27,46,39,0.72));
  }
  .transition-eyebrow{
    color:var(--gold); font-family:'JetBrains Mono', monospace; font-size:10px;
    letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px;
  }
  .transition-sentence{ color:var(--ink-dim); font-size:12.5px; line-height:1.5; margin-bottom:10px; }
  .transition-sentence strong{ color:var(--ink); font-weight:600; }
  .transition-progression{
    color:var(--gold); font-family:'JetBrains Mono', monospace; font-size:14px; font-weight:700;
    line-height:1.8; overflow-x:auto; white-space:nowrap; padding-bottom:2px;
  }
  .transition-tip{ color:var(--ink-dim); font-size:10.5px; line-height:1.45; margin-top:8px; }

  .setlist-header-actions{ display:flex; align-items:center; gap:9px; flex-shrink:0; }
  .setlist-lock{
    border:1px solid var(--line); background:rgba(18,33,29,0.64); color:var(--ink-dim);
    border-radius:9px; min-height:31px; padding:0 10px; font-size:11px; font-weight:600;
    display:flex; align-items:center; gap:5px;
  }
  .setlist-lock.locked{ color:var(--gold); border-color:rgba(212,175,106,0.5); background:var(--gold-dim); }
  .setlist-locked-message{
    color:var(--ink-dim); font-size:12px; line-height:1.5; padding:9px 11px; margin-bottom:12px;
    background:rgba(18,33,29,0.5); border:1px dashed rgba(212,175,106,0.3); border-radius:10px;
  }
  .setlist-note-summary{ color:var(--gold) !important; font-size:10.5px !important; }
  .setlist-note-btn.has-note{ color:var(--gold); background:var(--gold-dim); }
  .rehearsal-note{
    margin:0 0 18px; padding:13px 14px; border-left:3px solid var(--gold);
    border-radius:0 10px 10px 0; background:var(--gold-dim);
  }
  .rehearsal-note-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; }
  .rehearsal-note-title{ color:var(--gold); font-family:'JetBrains Mono', monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; }
  .rehearsal-note-edit{ background:none; border:none; color:var(--ink-dim); font-size:11px; text-decoration:underline; padding:0; }
  .rehearsal-note-body{ color:var(--ink); font-size:13px; line-height:1.55; white-space:pre-wrap; }
  .notes-textarea{
    width:100%; min-height:150px; resize:vertical; background:var(--bg); color:var(--ink);
    border:1px solid var(--line); border-radius:10px; padding:12px; font-size:14px; line-height:1.5; outline:none;
  }
  .notes-textarea:focus{ border-color:var(--gold); }
  .notes-actions{ display:flex; gap:10px; margin-top:14px; }

  .set-overview{
    display:flex; gap:6px; overflow-x:auto; padding:8px 0 3px; scrollbar-width:none;
    scroll-behavior:smooth;
  }
  .set-overview::-webkit-scrollbar{ display:none; }
  .set-overview-chip{
    flex:0 0 auto; max-width:190px; border:1px solid var(--line); background:rgba(27,46,39,0.94);
    color:var(--ink-dim); border-radius:999px; padding:6px 10px; font-size:11px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .set-overview-chip.active{ color:#1B2E27; background:var(--gold); border-color:var(--gold); font-weight:700; }
  .set-overview-chip .num{ font-family:'JetBrains Mono', monospace; margin-right:4px; }

  .song-jump-bar{
    display:flex; align-items:center; gap:6px; overflow-x:auto; padding:2px 0 12px; margin-bottom:4px;
    scrollbar-width:none;
  }
  .song-jump-bar::-webkit-scrollbar{ display:none; }
  .song-jump-label{ color:var(--ink-dim); font-family:'JetBrains Mono', monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; flex-shrink:0; margin-right:2px; }
  .song-jump-btn{
    flex:0 0 auto; border:1px solid var(--line); background:var(--surface); color:var(--ink-dim);
    border-radius:999px; padding:6px 10px; font-size:11px; white-space:nowrap;
  }
  .song-jump-btn:hover, .song-jump-btn:active{ color:var(--gold); border-color:var(--gold); background:var(--gold-dim); }
  .song-jump-btn.next{ color:var(--gold); }

  /* Sticky section navigation shown beneath the sticky song strip. */
  .sticky-section-nav{
    margin-top:7px; padding-top:7px; border-top:1px solid var(--line); min-width:0;
  }
  .sticky-section-current{
    display:flex; align-items:center; gap:7px; min-width:0; margin-bottom:6px;
  }
  .sticky-section-current span{
    flex-shrink:0; color:var(--gold); font-family:'JetBrains Mono', monospace;
    font-size:9px; letter-spacing:0.07em; text-transform:uppercase;
  }
  .sticky-section-current strong{
    min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--ink); font-family:'Fraunces', serif; font-size:13px;
  }
  .sticky-section-buttons{
    display:flex; align-items:center; gap:6px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:none; scroll-behavior:smooth;
  }
  .sticky-section-buttons::-webkit-scrollbar{ display:none; }
  .sticky-section-btn{
    flex:0 0 auto; border:1px solid var(--line); background:rgba(27,46,39,0.96);
    color:var(--ink-dim); border-radius:999px; padding:6px 10px; font-size:11px;
    white-space:nowrap;
  }
  .sticky-section-btn:hover, .sticky-section-btn:active, .sticky-section-btn.active{
    color:#1B2E27; border-color:var(--gold); background:var(--gold); font-weight:700;
  }
  .sticky-section-btn.next{ color:var(--gold); }
  .sticky-section-btn.next:hover, .sticky-section-btn.next:active{ color:#1B2E27; }
  .sticky-section-empty{ color:var(--ink-dim); font-size:11px; padding:3px 0; }
  .section-label{ scroll-margin-top:170px; }

  /* ---------- Library ---------- */
  .song-list{ display:flex; flex-direction:column; gap:10px; }
  .song-card{
    background: var(--surface); border:1px solid var(--line); border-radius: var(--radius);
    padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
    gap:12px;
  }
  .song-card:active{ background: var(--surface-alt); }
  .song-card .info{ min-width:0; }
  .song-card h3{
    font-family:'Fraunces', serif; font-weight:600; font-size:17px; margin:0 0 3px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .song-card p{ margin:0; font-size:12.5px; color:var(--ink-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .key-badge{
    font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--gold);
    background: var(--gold-dim); border-radius:7px; padding:4px 9px; flex-shrink:0;
  }
  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-dim); }
  .empty-state svg{ opacity:0.4; margin-bottom:14px; }
  .empty-state p{ font-size:14px; line-height:1.6; margin: 0 auto; max-width:280px; }

  /* ---------- Song view ---------- */
  .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .icon-btn{
    background: var(--surface); border:1px solid var(--line); color: var(--ink);
    border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .icon-btn:active{ background: var(--surface-alt); }
  .icon-btn.danger{ color: var(--danger); }

  .song-header{ margin-bottom:14px; }
  .song-header h2{ font-family:'Fraunces', serif; font-weight:700; font-size:26px; margin:0 0 2px; }

  .control-panel{
    background: var(--surface); border:1px solid var(--line); border-radius: var(--radius);
    padding:14px 16px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; gap:10px;
    flex-wrap: wrap;
  }
  .transpose-group{ display:flex; align-items:center; gap:10px; }
  .transpose-btn{
    background: var(--surface-alt); border:1px solid var(--line); color:var(--ink);
    width:34px; height:34px; border-radius:9px; font-size:16px; font-weight:600; display:flex; align-items:center; justify-content:center;
  }
  .transpose-btn:active{ background: var(--gold-dim); }
  .key-display{ font-family:'JetBrains Mono', monospace; text-align:center; min-width:88px; }
  .key-display .k{ font-size:18px; color:var(--gold); font-weight:700; }
  .key-display .orig{ font-size:10px; color:var(--ink-dim); display:block; margin-top:1px; }

  .toggle-wrap{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-dim); }
  .toggle{ width:42px; height:24px; border-radius:999px; background: var(--surface-alt); border:1px solid var(--line); position:relative; flex-shrink:0; }
  .toggle .dot{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background: var(--ink-dim); transition: all 0.15s ease; }
  .toggle.on{ background: var(--gold-dim); border-color: var(--gold); }
  .toggle.on .dot{ transform: translateX(18px); background: var(--gold); }
  .toggle-label-on{ color: var(--gold); }

  /* ---------- Song body ---------- */
  .song-body{ font-size:16px; line-height:1.6; }
  .section-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.08em;
    color: var(--gold); text-transform:uppercase; margin: 20px 0 6px; opacity:0.85;
  }
  .section-label:first-child{ margin-top:0; }
  .lyric-line{ white-space:nowrap; overflow-x:auto; overflow-y:visible; padding:2px 0 6px; position:relative; }
  .lyric-line::-webkit-scrollbar{ height:3px; }

  /*
    Each chord/lyric pair is a tiny two-row grid. Keeping the chord in normal
    layout flow makes the unit at least as wide as the chord label, so longer
    symbols such as D/F# cannot overlap the chord that follows it.
  */
  .cl-unit{
    position:relative;
    display:inline-grid;
    grid-template-rows:18px auto;
    grid-template-columns:max-content;
    align-items:end;
    vertical-align:bottom;
    min-width:0;
  }
  .cl-unit .chord{
    position:static;
    grid-row:1;
    grid-column:1;
    align-self:end;
    justify-self:start;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:700;
    color:var(--gold);
    white-space:nowrap;
    line-height:1;
    z-index:1;
  }
  .cl-unit .chord.tappable{ cursor:pointer; padding:1px 3px; margin-left:-3px; border-radius:5px; }
  .cl-unit .chord.tappable:active{ background: var(--gold-dim); }
  .cl-unit .lyric{
    grid-row:2;
    grid-column:1;
    white-space:pre;
    min-width:0;
  }
  .cl-unit.chord-wide{ padding-right:4px; }
  .blank-line{ height:12px; }

  /* ---------- Upload / edit form ---------- */
  .form-field{ margin-bottom:16px; }
  .form-field label{ display:block; font-size:12px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .form-field input, .form-field select, .form-field textarea{
    width:100%; background: var(--surface); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:11px 13px; font-size:14px; outline:none;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus{ border-color: var(--gold); }
  .form-field textarea{ font-family:'JetBrains Mono', monospace; font-size:13.5px; line-height:1.7; min-height:220px; resize:vertical; }
  .form-hint{ font-size:12px; color:var(--ink-dim); margin-top:7px; line-height:1.5; }
  .form-hint code{ background: var(--surface-alt); padding:1px 5px; border-radius:4px; color:var(--gold); }
  .form-actions{ display:flex; gap:10px; margin-top:22px; }
  .btn-secondary{
    background: var(--surface); border:1px solid var(--line); color:var(--ink);
    border-radius:999px; padding:12px 20px; font-size:14px; flex:1;
  }
  .btn-primary{
    background: var(--gold); border:none; color:#1B2E27; font-weight:700;
    border-radius:999px; padding:12px 20px; font-size:14px; flex:2;
  }

  /* ---------- Chord popover (bottom sheet) ---------- */
  .backdrop{
    position:fixed; inset:0; background:rgba(6,12,10,0.6); backdrop-filter:blur(2px);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .sheet{
    background: var(--surface); border:1px solid var(--line); border-bottom:none;
    border-radius: 20px 20px 0 0; width:100%; max-width:720px; padding:22px 22px 30px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp{ from{ transform: translateY(30px); opacity:0 } to{ transform: translateY(0); opacity:1 } }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 18px; }
  .sheet-title{ font-family:'Fraunces', serif; font-weight:700; font-size:28px; text-align:center; color:var(--gold); margin-bottom:2px; }
  .sheet-sub{ text-align:center; font-size:12px; color:var(--ink-dim); margin-bottom:18px; font-family:'JetBrains Mono', monospace; }
  .diagram-row{ display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
  .diagram-col{ text-align:center; }
  .diagram-col .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-dim); margin-bottom:8px; }
  .no-diagram{ font-size:13px; color:var(--ink-dim); padding:20px; text-align:center; max-width:260px; }
  .sheet-close{

<body>
<div class="app" id="app"></div>

<script>
/* ============================= DATA / MUSIC THEORY ============================= */

const NOTE_INDEX = {C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
const PREFERRED_NAME = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const ALL_KEYS = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

const QUALITY_MAP = [
  ['maj7','maj7'],['maj9','maj7'],['m7b5','m7b5'],['min7','m7'],['sus2','sus2'],['sus4','sus4'],['add9','add9'],['dim7','dim7'],
  ['min','min'],['dim','dim'],['aug','aug'],['maj','maj'],
  ['m9','m9'],['m6','m6'],['m7','m7'],
  ['6','6'],['9','9'],['7','7'],['2','sus2'],
  ['m','min'],
  ['','maj']
];

const INTERVALS = {
  maj:[0,4,7], min:[0,3,7], '7':[0,4,7,10], maj7:[0,4,7,11], m7:[0,3,7,10],
  m6:[0,3,7,9], m9:[0,3,7,10,2], m7b5:[0,3,6,10], sus2:[0,2,7], sus4:[0,5,7],
  dim:[0,3,6], dim7:[0,3,6,9], aug:[0,4,8], '6':[0,4,7,9], '9':[0,4,7,10,2],
  '11':[0,4,7,10,2,5], '13':[0,4,7,10,2,9], add9:[0,4,7,2]
};

const QUALITY_LABEL = {
  maj:'', min:'m', '7':'7', maj7:'maj7', m7:'m7', m6:'m6', m9:'m9', m7b5:'m7\u266d5',
  sus2:'sus2', sus4:'sus4', dim:'dim', dim7:'dim7', aug:'aug', '6':'6', '9':'9', '11':'11', '13':'13', add9:'add9'
};


function normalizeQuality(raw){
  const lower = (raw || '').trim().toLowerCase();
  for(const [key, norm] of QUALITY_MAP){
    if(key !== '' && lower.startsWith(key)) return norm;
  }
  return 'maj';
}

function parseChordSymbol(sym){
  const normalized = String(sym || '')
    .trim()
    .replace(/♯/g, '#')
    .replace(/♭/g, 'b');

  const match = normalized.match(/^([A-G])([#b]?)([^\/]*)(?:\/([A-G][#b]?))?$/);
  if(!match) return null;

  const rootName = match[1] + (match[2] || '');
  const rootIdx = NOTE_INDEX[rootName];
  if(rootIdx === undefined) return null;

  const norm = normalizeQuality(match[3] || '');
  const bassIdx = match[4] ? NOTE_INDEX[match[4]] : null;
  return { rootIdx, norm, bassIdx, raw: normalized };
}

function formatChordSymbol(rootIdx, norm, bassIdx){
  const normalizedRoot = ((rootIdx % 12) + 12) % 12;
  let symbol = PREFERRED_NAME[normalizedRoot] +
    (QUALITY_LABEL[norm] !== undefined ? QUALITY_LABEL[norm] : '');

  if(bassIdx !== null && bassIdx !== undefined){
    const normalizedBass = ((bassIdx % 12) + 12) % 12;
    symbol += '/' + PREFERRED_NAME[normalizedBass];
  }
  return symbol;
}

function transposeChordSymbol(sym, semitones){
  const parsed = parseChordSymbol(sym);
  if(!parsed) return sym;

  const newRoot = ((parsed.rootIdx + semitones) % 12 + 12) % 12;
  const newBass = parsed.bassIdx !== null && parsed.bassIdx !== undefined
    ? ((parsed.bassIdx + semitones) % 12 + 12) % 12
    : null;

  return formatChordSymbol(newRoot, parsed.norm, newBass);
}

function transposeKeyName(keyName, semitones){
  const normalized = String(keyName || '').replace(/♯/g, '#').replace(/♭/g, 'b');
  const idx = NOTE_INDEX[normalized];
  if(idx === undefined) return keyName;
  return PREFERRED_NAME[((idx + semitones) % 12 + 12) % 12];
}

/* ---------- Set-list key transitions ---------- */
// Two-measure transition patterns supplied in the Continuity in Worship chart.
// Each template starts in C; it is transposed to the displayed key of the outgoing song.
const TRANSITION_TEMPLATES_FROM_C = {
  1: 'C / / / Ab/C Bbm Ab7 / Db',
  2: 'C / / / Em / Asus A D',
  3: 'C / / / Ab/C / Bb/D / Eb',
  4: 'C / / / D / B/D# / E',
  5: 'C / / / Bb/D / C/E / F',
  6: 'C / / C/E Cb/Eb / Db/F / Gb',
  7: 'C / Am7 / D / / D/F# G',
  8: 'C / / Csus Db/F / Eb/G / Ab',
  9: 'C / / C/E D/F# / E/G# / A',
  10: 'C / / / Eb/C / F / Bb',
  11: 'C / / / C#m7 / F#sus F#7 B'
};

// Exact additional starting-key tables from the supplied chart. Using these directly
// preserves its practical enharmonic spellings instead of producing theoretical double accidentals.
const TRANSITION_TEMPLATES_BY_START = {
  C: TRANSITION_TEMPLATES_FROM_C,
  A: {
    1:'A / / / F/A Gm F7 / Bb',
    2:'A / / / C#m / F#sus F# B',
    3:'A / / / F/A / G/B / C',
    4:'A / / / B / Ab/C / Db',
    5:'A / / / G/B / A/C# / D',
    6:'A / / A/C# Ab/C / Bb/D / Eb',
    7:'A / F#m7 / B / / B/D# E',
    8:'A / / Asus Bb/D / C/E / F',
    9:'A / / A/C# B/Eb / Db/F / Gb',
    10:'A / / / C/A / D / G',
    11:'A / / / Bbm7 / Ebsus Eb7 Ab'
  },
  G: {
    1:'G / / / Eb/G Fm Eb7 / Ab',
    2:'G / / / Bm / Esus E A',
    3:'G / / / Eb/G / F/A / Bb',
    4:'G / / / A / F#/A# / B',
    5:'G / / / F/A / G/B / C',
    6:'G / / G/B Gb/Bb / Ab/C / Db',
    7:'G / Em7 / A / / A/C# D',
    8:'G / / Gsus Ab/C / Bb/D / Eb',
    9:'G / / G/B A/C# / B/D# / E',
    10:'G / / / Bb/G / C / F',
    11:'G / / / Abm7 / Dbsus Db7 Gb'
  },
  E: {
    1:'E / / / C/E Dm C7 / F',
    2:'E / / / Abm / Dbsus Db Gb',
    3:'E / / / C/E / D/F# / G',
    4:'E / / / Gb / Eb/G / Ab',
    5:'E / / / D/F# / E/G# / A',
    6:'E / / E/G# Eb/G / F/A / Bb',
    7:'E / C#m7 / F# / / F#/A# B',
    8:'E / / Esus F/A / G/B / C',
    9:'E / / E/G# Gb/Bb / Ab/C / Db',
    10:'E / / / G/E / A / D',
    11:'E / / / Fm7 / Bbsus Bb7 Eb'
  },
  D: {
    1:'D / / / Bb/D Cm Bb7 / Eb',
    2:'D / / / F#m / Bsus B E',
    3:'D / / / Bb/D / C/E / F',
    4:'D / / / E / Db/F / Gb',
    5:'D / / / C/E / D/F# / G',
    6:'D / / D/F# Db/F / Eb/G / Ab',
    7:'D / Bm7 / E / / E/G# A',
    8:'D / / Dsus Eb/G / F/A / Bb',
    9:'D / / D/F# E/G# / F#/A# / B',
    10:'D / / / F/D / G / C',
    11:'D / / / Ebm7 / Absus Ab7 Db'
  }
};

const TRANSITION_LETTERS = ['C','D','E','F','G','A','B'];
const NATURAL_NOTE_INDEX = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const SHARP_NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_NOTE_NAMES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

function transitionNoteIndex(note){
  const match = String(note || '').match(/^([A-G])([#b]?)$/);
  if(!match) return null;
  const offset = match[2] === '#' ? 1 : (match[2] === 'b' ? -1 : 0);
  return (NATURAL_NOTE_INDEX[match[1]] + offset + 12) % 12;
}

function simpleEnharmonicName(pc, destinationKey){
  const flatKeys = new Set(['Db','Eb','F','Ab','Bb']);
  return (flatKeys.has(destinationKey) ? FLAT_NOTE_NAMES : SHARP_NOTE_NAMES)[((pc%12)+12)%12];
}

function transposeTransitionNote(note, startKey){
  if(startKey === 'C') return note;
  const sourceMatch = String(note || '').match(/^([A-G])([#b]?)$/);
  const startIdx = NOTE_INDEX[startKey];
  if(!sourceMatch || startIdx === undefined) return note;

  const sourceLetter = sourceMatch[1];
  const sourcePc = transitionNoteIndex(note);
  const diatonicShift = (TRANSITION_LETTERS.indexOf(startKey[0]) - TRANSITION_LETTERS.indexOf('C') + 7) % 7;
  const newLetter = TRANSITION_LETTERS[(TRANSITION_LETTERS.indexOf(sourceLetter) + diatonicShift) % 7];
  const targetPc = (sourcePc + startIdx) % 12;
  let accidentalDistance = (targetPc - NATURAL_NOTE_INDEX[newLetter] + 12) % 12;
  if(accidentalDistance > 6) accidentalDistance -= 12;

  // Preserve sensible diatonic spellings, but avoid double sharps/flats in a volunteer-facing chart.
  if(Math.abs(accidentalDistance) <= 1){
    return newLetter + (accidentalDistance === 1 ? '#' : accidentalDistance === -1 ? 'b' : '');
  }
  return simpleEnharmonicName(targetPc, startKey);
}

function transposeTransitionChord(chord, startKey){
  if(chord === '/') return chord;
  const match = String(chord || '').match(/^([A-G][#b]?)([^\/]*)?(?:\/([A-G][#b]?))?$/);
  if(!match) return chord;
  const root = transposeTransitionNote(match[1], startKey);
  const suffix = match[2] || '';
  const bass = match[3] ? '/' + transposeTransitionNote(match[3], startKey) : '';
  return root + suffix + bass;
}

function getTransitionSuggestion(fromKey, toKey){
  const fromIdx = NOTE_INDEX[fromKey];
  const toIdx = NOTE_INDEX[toKey];
  if(fromIdx === undefined || toIdx === undefined) return null;

  const interval = (toIdx - fromIdx + 12) % 12;
  if(interval === 0){
    return {
      sameKey:true,
      interval:0,
      progression:`${fromKey} / / / ${fromKey} / / /`
    };
  }

  const exactTemplate = TRANSITION_TEMPLATES_BY_START[fromKey]?.[interval];
  const template = exactTemplate || TRANSITION_TEMPLATES_FROM_C[interval];
  if(!template) return null;
  const tokens = exactTemplate
    ? template.split(/\s+/)
    : template.split(/\s+/).map(token => transposeTransitionChord(token, fromKey));
  // The source chart sometimes uses an enharmonic name (for example Gb) while
  // the app's key selector uses the equivalent sharp name (F#). End on the exact selected key.
  tokens[tokens.length - 1] = toKey;
  return {
    sameKey:false,
    interval,
    progression:tokens.join(' ')
  };
}

function renderTransitionCard(fromKey, toKey, nextSongTitle){
  const suggestion = getTransitionSuggestion(fromKey, toKey);
  if(!suggestion) return '';

  const sentence = suggestion.sameKey
    ? `Both songs are in <strong>${escapeHtml(fromKey)}</strong>. Hold the tonic through the transition into <strong>${escapeHtml(nextSongTitle)}</strong>.`
    : `To move from <strong>${escapeHtml(fromKey)}</strong> into <strong>${escapeHtml(toKey)}</strong> for <strong>${escapeHtml(nextSongTitle)}</strong>, try this suggested two-measure transition:`;

  return `
    <aside class="transition-card" aria-label="Suggested transition from ${escapeAttr(fromKey)} to ${escapeAttr(toKey)}">
      <div class="transition-eyebrow">Transition to the next song</div>
      <div class="transition-sentence">${sentence}</div>
      <div class="transition-progression">${escapeHtml(suggestion.progression)}</div>
      <div class="transition-tip">Slashes mean keep time without changing chord. Treat this as a starting point and adjust for tempo, ending chord, and arrangement.</div>
    </aside>`;
}

// Standard guitar voicings. String order low-to-high: [E, A, D, G, B, e].
// Frets are absolute; 0 = open and "x" = muted. Finger numbers follow the
// standard convention: 1 index, 2 middle, 3 ring, 4 pinky.
function guitarShape(frets, fingers, barres = []){
  return { frets, fingers, barres };
}

const GUITAR_OPEN_SHAPES = {
  // Major
  '0_maj':  guitarShape(['x',3,2,0,1,0], ['x',3,2,0,1,0]),                  // C
  '2_maj':  guitarShape(['x','x',0,2,3,2], ['x','x',0,1,3,2]),              // D
  '4_maj':  guitarShape([0,2,2,1,0,0], [0,2,3,1,0,0]),                      // E
  '5_maj':  guitarShape([1,3,3,2,1,1], [1,3,4,2,1,1], [{fret:1,from:0,to:5,finger:1}]), // F
  '7_maj':  guitarShape([3,2,0,0,3,3], [2,1,0,0,3,4]),                      // G
  '9_maj':  guitarShape(['x',0,2,2,2,0], ['x',0,1,2,3,0]),                  // A

  // Minor
  '2_min':  guitarShape(['x','x',0,2,3,1], ['x','x',0,2,3,1]),              // Dm
  '4_min':  guitarShape([0,2,2,0,0,0], [0,2,3,0,0,0]),                      // Em
  '9_min':  guitarShape(['x',0,2,2,1,0], ['x',0,2,3,1,0]),                  // Am

  // Dominant seventh
  '0_7':    guitarShape(['x',3,2,3,1,0], ['x',3,2,4,1,0]),                  // C7
  '2_7':    guitarShape(['x','x',0,2,1,2], ['x','x',0,2,1,3]),              // D7
  '4_7':    guitarShape([0,2,0,1,0,0], [0,2,0,1,0,0]),                      // E7
  '5_7':    guitarShape([1,3,1,2,1,1], [1,3,1,2,1,1], [{fret:1,from:0,to:5,finger:1}]), // F7
  '7_7':    guitarShape([3,2,0,0,0,1], [3,2,0,0,0,1]),                      // G7
  '9_7':    guitarShape(['x',0,2,0,2,0], ['x',0,2,0,3,0]),                  // A7
  '11_7':   guitarShape(['x',2,1,2,0,2], ['x',2,1,3,0,4]),                  // B7

  // Major seventh
  '0_maj7': guitarShape(['x',3,2,0,0,0], ['x',3,2,0,0,0]),                  // Cmaj7
  '2_maj7': guitarShape(['x','x',0,2,2,2], ['x','x',0,1,2,3]),              // Dmaj7
  '4_maj7': guitarShape([0,2,1,1,0,0], [0,3,1,2,0,0]),                      // Emaj7
  '5_maj7': guitarShape(['x','x',3,2,1,0], ['x','x',3,2,1,0]),              // Fmaj7
  '7_maj7': guitarShape([3,2,0,0,0,2], [3,2,0,0,0,1]),                      // Gmaj7
  '9_maj7': guitarShape(['x',0,2,1,2,0], ['x',0,2,1,3,0]),                  // Amaj7

// Movable E- and A-family barre shapes. These provide real playable voicings for
// chromatic roots while the open-shape table above keeps common chords familiar.
const GUITAR_MOVABLE_SHAPES = {
  maj: [
    {base:4, offsets:[0,2,2,1,0,0], fingers:[1,3,4,2,1,1], barre:{from:0,to:5}},
    {base:9, offsets:['x',0,2,2,2,0], fingers:['x',1,3,3,3,1], barre:{from:1,to:5}}
  ],
  min: [
    {base:4, offsets:[0,2,2,0,0,0], fingers:[1,3,4,1,1,1], barre:{from:0,to:5}},
    {base:9, offsets:['x',0,2,2,1,0], fingers:['x',1,3,4,2,1], barre:{from:1,to:5}}
  ],
  '7': [
    {base:4, offsets:[0,2,0,1,0,0], fingers:[1,3,1,2,1,1], barre:{from:0,to:5}},
    {base:9, offsets:['x',0,2,0,2,0], fingers:['x',1,3,1,4,1], barre:{from:1,to:5}}
  ],
  maj7: [
    {base:4, offsets:[0,2,1,1,0,0], fingers:[1,4,2,3,1,1], barre:{from:0,to:5}},
    {base:9, offsets:['x',0,2,1,2,0], fingers:['x',1,3,2,4,1], barre:{from:1,to:5}}
  ],
  m7: [
    {base:4, offsets:[0,2,0,0,0,0], fingers:[1,3,1,1,1,1], barre:{from:0,to:5}},

    {base:9, offsets:['x',0,2,2,3,0], fingers:['x',1,2,3,4,1], barre:{from:1,to:5}}
  ]

function buildMovableShape(template, rootIdx){
  const rootFret = ((rootIdx - template.base) % 12 + 12) % 12;
  const frets = template.offsets.map(offset => offset === 'x' ? 'x' : rootFret + offset);
  const barres = rootFret > 0 && template.barre
    ? [{fret:rootFret, from:template.barre.from, to:template.barre.to, finger:1}]
    : [];
  return guitarShape(frets, template.fingers.slice(), barres);
}

function getGuitarShape(rootIdx, norm, bassIdx = null){
  if(bassIdx !== null && bassIdx !== undefined){
    const slashKey = `${rootIdx}_${norm}_${bassIdx}`;
    if(GUITAR_SLASH_SHAPES[slashKey]) return GUITAR_SLASH_SHAPES[slashKey];
  }

  const openKey = `${rootIdx}_${norm}`;
  if(GUITAR_OPEN_SHAPES[openKey]) return GUITAR_OPEN_SHAPES[openKey];

  const templates = GUITAR_MOVABLE_SHAPES[norm];
  if(!templates) return null;

  const candidates = templates.map(template => {
    const shape = buildMovableShape(template, rootIdx);
    const positive = shape.frets.filter(f => typeof f === 'number' && f > 0);
    const min = positive.length ? Math.min(...positive) : 0;
    const max = positive.length ? Math.max(...positive) : 0;
    return {shape, score:min * 10 + max};
  });
  candidates.sort((a,b) => a.score - b.score);
  return candidates[0].shape;
}

function renderGuitarSVG(rootIdx, norm, bassIdx = null){
  const shape = getGuitarShape(rootIdx, norm, bassIdx);
  if(!shape) return null;

  const frets = shape.frets;
  const fingers = shape.fingers || [];
  const positiveFrets = frets.filter(f => typeof f === 'number' && f > 0);
  const minFret = positiveFrets.length ? Math.min(...positiveFrets) : 1;
  const maxFret = positiveFrets.length ? Math.max(...positiveFrets) : 4;
  const hasOpenStrings = frets.some(f => f === 0);
  const startFret = hasOpenStrings || minFret === 1 ? 0 : minFret;
  const numFrets = Math.max(4, Math.min(5, maxFret - (startFret || 1) + 1));

  const W=160, H=205, left=28, right=16, top=34, bottom=31;
  const stringGap=(W-left-right)/5;
  const fretGap=(H-top-bottom)/numFrets;
  const stringNames=['E','A','D','G','B','e'];

  const fretCenterY = fret => {
    const row = startFret === 0 ? fret - 1 : fret - startFret;
    return top + row * fretGap + fretGap / 2;
  };

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Guitar chord fingering">`;

  if(startFret===0){
    svg += `<rect x="${left}" y="${top-1}" width="${W-left-right}" height="4" rx="2" fill="#EDE6D6"/>`;
  } else {
    svg += `<text x="${left-6}" y="${top+13}" font-size="10" fill="#A9B8AE" text-anchor="end" font-family="JetBrains Mono, monospace">${startFret}fr</text>`;
  }

  for(let row=0; row<=numFrets; row++){
    const y=top+row*fretGap;
    if(startFret===0 && row===0) continue;
    svg += `<line x1="${left}" y1="${y}" x2="${W-right}" y2="${y}" stroke="rgba(237,230,214,0.28)" stroke-width="1.5"/>`;
  }

  for(let string=0; string<6; string++){
    const x=left+string*stringGap;
    svg += `<line x1="${x}" y1="${top}" x2="${x}" y2="${H-bottom}" stroke="rgba(237,230,214,0.42)" stroke-width="1.5"/>`;
    svg += `<text x="${x}" y="${H-9}" font-size="9" fill="#A9B8AE" text-anchor="middle" font-family="JetBrains Mono, monospace">${stringNames[string]}</text>`;
  }

  frets.forEach((f,string) => {
    const x=left+string*stringGap;
    if(f==='x'){
      svg += `<text x="${x}" y="${top-10}" font-size="12" fill="#C1666B" text-anchor="middle" font-family="JetBrains Mono, monospace">×</text>`;
    } else if(f===0){
      svg += `<circle cx="${x}" cy="${top-14}" r="4.5" fill="none" stroke="#A9B8AE" stroke-width="1.5"/>`;
    }
  });

  // Draw barre indicators first, behind the individual finger dots.
  (shape.barres || []).forEach(barre => {
    if(barre.fret <= 0) return;
    const y=fretCenterY(barre.fret);
    const x1=left+barre.from*stringGap;
    const x2=left+barre.to*stringGap;
    svg += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#D4AF6A" stroke-width="14" stroke-linecap="round"/>`;
    svg += `<text x="${(x1+x2)/2}" y="${y+3.5}" font-size="9" font-weight="700" fill="#1B2E27" text-anchor="middle" font-family="Inter, sans-serif">${barre.finger || 1}</text>`;
  });

  frets.forEach((f,string) => {
    if(typeof f !== 'number' || f <= 0) return;
    const finger=fingers[string];
    const representedByBarre=(shape.barres || []).some(barre =>
      barre.fret===f && string>=barre.from && string<=barre.to && (barre.finger || 1)===finger
    );
    if(representedByBarre) return;

    const x=left+string*stringGap;
    const y=fretCenterY(f);
    svg += `<circle cx="${x}" cy="${y}" r="8" fill="#D4AF6A" stroke="#1B2E27" stroke-width="1.2"/>`;
    if(finger && finger !== 0){
      svg += `<text x="${x}" y="${y+3.5}" font-size="9" font-weight="700" fill="#1B2E27" text-anchor="middle" font-family="Inter, sans-serif">${finger}</text>`;
    }
  });

  svg += `</svg>`;
  return svg;
}

/* ---------- Piano diagram: one octave, each chord tone shown once ---------- */
function renderPianoSVG(rootIdx, norm, bassIdx = null){
  const intervals = INTERVALS[norm] || [0,4,7];
  const pcs = new Set(intervals.map(iv => ((rootIdx+iv)%12+12)%12));
  const whiteNotes = [0,2,4,5,7,9,11];
  const blackDefs = [{i:0,pc:1},{i:1,pc:3},{i:3,pc:6},{i:4,pc:8},{i:5,pc:10}];
  const W=196, H=112, whiteW=W/7, blackW=whiteW*0.62, blackH=H*0.62;

  const whiteFill = pc => {
    if(pc===rootIdx) return '#D4AF6A';
    if(pcs.has(pc)) return 'rgba(212,175,106,0.42)';
    return '#EDE6D6';
  };
  const blackFill = pc => {
    if(pc===rootIdx) return '#D4AF6A';
    if(pcs.has(pc)) return '#4a6358';
    return '#12211D';
  };

  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="One octave piano chord diagram">`;
  whiteNotes.forEach((pc,i) => {
    const bassStroke = bassIdx===pc && bassIdx!==rootIdx ? '#C1666B' : 'rgba(18,33,29,0.5)';
    const bassWidth = bassIdx===pc && bassIdx!==rootIdx ? 3 : 1;
    svg += `<rect x="${i*whiteW}" y="0" width="${whiteW-1}" height="${H}" rx="2" fill="${whiteFill(pc)}" stroke="${bassStroke}" stroke-width="${bassWidth}"/>`;
  });
  blackDefs.forEach(({i,pc}) => {
    const x=(i+1)*whiteW-blackW/2;
    const bassStroke = bassIdx===pc && bassIdx!==rootIdx ? '#C1666B' : 'none';
    const bassWidth = bassIdx===pc && bassIdx!==rootIdx ? 3 : 0;
    svg += `<rect x="${x}" y="0" width="${blackW}" height="${blackH}" rx="2" fill="${blackFill(pc)}" stroke="${bassStroke}" stroke-width="${bassWidth}"/>`;
  });
  svg += `</svg>`;
  return svg;
}

/* ============================= SONG BODY PARSING ============================= */

function parseLineTokens(line){
  const regex = /\[([^\]]+)\]/g;
  const tokens = [];
  let lastIndex = 0, m;
  let sawChord = false;
  while((m = regex.exec(line)) !== null){
    if(!sawChord && m.index > 0){ tokens.push({chord:null, text: line.slice(0, m.index)}); }
    sawChord = true;
    const chord = m[1];
    const nextIdx = regex.lastIndex;
    const rest = line.slice(nextIdx);
    const nextBracket = rest.indexOf('[');
    const text = nextBracket === -1 ? rest : rest.slice(0, nextBracket);
    tokens.push({chord, text});
    lastIndex = nextIdx;
  }
  if(tokens.length===0){ tokens.push({chord:null, text: line}); }
  return tokens;
}

function transposeBody(body, semitones){
  if(!semitones) return body;
  return body.split('\n').map(line=>{
    return line.replace(/\[([^\]]+)\]/g, (whole, sym)=> `[${transposeChordSymbol(sym, semitones)}]`);
  }).join('\n');
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeAttr(s){
  return escapeHtml(s).replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

function extractSongSections(body){
  const sections = [];
  String(body||'').split('\n').forEach(line=>{
    const match = line.trim().match(/^\{(.+)\}$/);
    if(match) sections.push(match[1].trim());
  });
  return sections;
}

function renderSongBodyHTML(body, chordModeOn, anchorPrefix=''){
  const lines = body.split('\n');
  let html = '';
  let sectionIndex = 0;
  lines.forEach(line=>{
    const trimmed = line.trim();
    if(trimmed===''){ html += `<div class="blank-line"></div>`; return; }
    const sectionMatch = trimmed.match(/^\{(.+)\}$/);
    if(sectionMatch){
      const anchor = anchorPrefix ? ` id="section-${escapeAttr(anchorPrefix)}-${sectionIndex}" data-section-song="${escapeAttr(anchorPrefix)}" data-section-index="${sectionIndex}"` : '';
      html += `<div class="section-label"${anchor}>${escapeHtml(sectionMatch[1])}</div>`;
      sectionIndex += 1;
      return;
    }
    const tokens = parseLineTokens(line);
    let lineHtml = `<div class="lyric-line">`;
    tokens.forEach(tok=>{
      const chordHtml = tok.chord
        ? `<span class="chord${chordModeOn ? ' tappable' : ''}" ${chordModeOn ? `onclick="openChordSheet('${escapeHtml(tok.chord).replace(/'/g,"\\'")}')"` : ''}>${escapeHtml(tok.chord)}</span>`
        : '';
      const lyricText = tok.text === '' ? '\u00A0' : tok.text;
      const wideChordClass = tok.chord && tok.chord.length > tok.text.trim().length ? ' chord-wide' : '';
      lineHtml += `<span class="cl-unit${tok.chord ? ' has-chord' : ''}${wideChordClass}">${chordHtml}<span class="lyric">${escapeHtml(lyricText)}</span></span>`;
    });
    lineHtml += `</div>`;
    html += lineHtml;
  });
  return html;
}

function renderSongJumpControls(song, nextSong){
  const sections = extractSongSections(song.body);
  if(sections.length===0 && !nextSong) return '';
  const sectionButtons = sections.map((label,index)=>
    `<button class="song-jump-btn" onclick="jumpToSongSection('${song.id}',${index})">${escapeHtml(label)}</button>`
  ).join('');
  const nextButton = nextSong
    ? `<button class="song-jump-btn next" onclick="jumpToSetSong('${nextSong.id}')">Next song &rarr;</button>`
    : '';
  return `<div class="song-jump-bar"><span class="song-jump-label">Jump</span>${sectionButtons}${nextButton}</div>`;
}

function renderStickySectionNavHTML(song, nextSong){
  if(!song) return '';
  const sections = extractSongSections(song.body);
  const buttons = sections.map((label,index)=>
    `<button class="sticky-section-btn" data-sticky-section-index="${index}" onclick="jumpToSongSection('${song.id}',${index})">${escapeHtml(label)}</button>`
  ).join('');
  const nextButton = nextSong
    ? `<button class="sticky-section-btn next" onclick="jumpToSetSong('${nextSong.id}')">Next song &rarr;</button>`
    : '';
  const controls = buttons || nextButton
    ? `<div class="sticky-section-buttons">${buttons}${nextButton}</div>`
    : `<div class="sticky-section-empty">No labeled sections in this song.</div>`;
  return `
    <div class="sticky-section-current">
      <span>Current song</span>
      <strong>${escapeHtml(song.title)}</strong>
    </div>
    ${controls}`;
}

const STORAGE_KEY = 'songs';
const SETLIST_STORAGE_KEY = 'sundaySetlist';
const SHARED = true;

// Supabase is the primary shared database. This publishable key is intended
// for browser use; access is still controlled by the table's RLS policies.
const SUPABASE_URL = 'https://nwikupipvwgjzjburwia.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_cmxhMF5Y_iZ9yuP_3ELvhw_EGd3LMn8';
const SUPABASE_STORAGE_TABLE = 'app_storage';
const SUPABASE_SONGS_TABLE = 'songs';

let storageStatus = 'connecting'; // connecting | cloud | local
let storageStatusDetail = '';

function updateStorageStatus(mode, detail=''){
  storageStatus = mode;
  storageStatusDetail = detail;
  const el = document.getElementById('sync-status');
  if(!el) return;
  el.textContent = mode === 'cloud' ? 'Cloud sync' : mode === 'local' ? 'Local backup' : 'Connecting…';
  el.title = detail || (mode === 'cloud'
    ? 'Songs and Sunday sets are syncing through Supabase.'
    : mode === 'local'
      ? 'Supabase is unavailable. Changes are saved only in this browser until cloud sync returns.'
      : 'Connecting to Supabase…');
  el.dataset.mode = mode;
}

function supabaseEndpoint(query=''){
  return `${SUPABASE_URL}/rest/v1/${SUPABASE_STORAGE_TABLE}${query}`;
}

function supabaseSongsEndpoint(query=''){
  return `${SUPABASE_URL}/rest/v1/${SUPABASE_SONGS_TABLE}${query}`;
}

async function readSupabaseValue(key){
  const query = `?key=eq.${encodeURIComponent(key)}&select=value&limit=1`;
  const response = await fetch(supabaseEndpoint(query), {
    method: 'GET',
    headers: {
      apikey: SUPABASE_PUBLISHABLE_KEY,
      Accept: 'application/json'
    },
    cache: 'no-store'
  });
  if(!response.ok){
    const message = await response.text();
    throw new Error(`Supabase read failed (${response.status}): ${message}`);
  }
  const rows = await response.json();
  updateStorageStatus('cloud');
  return rows.length ? rows[0].value : null;
}

async function writeSupabaseValue(key, value){
  const response = await fetch(supabaseEndpoint('?on_conflict=key'), {
    method: 'POST',
    headers: {
      apikey: SUPABASE_PUBLISHABLE_KEY,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({ key, value })
  });
  if(!response.ok){
    const message = await response.text();
    throw new Error(`Supabase save failed (${response.status}): ${message}`);
  }
  updateStorageStatus('cloud');
}

async function readLegacyValue(key){
  try{
    if(window.storage && typeof window.storage.get === 'function'){
      const result = await window.storage.get(key, SHARED);
      if(result && result.value) return result.value;
    }
  }catch(error){
    console.warn('Previous shared storage unavailable', error);
  }

  try{
    return window.localStorage.getItem(key);
  }catch(error){
    console.warn('Browser storage unavailable', error);
    return null;
  }
}

async function writeBrowserBackup(key, value){
  try{
    window.localStorage.setItem(key, value);
  }catch(error){
    console.warn('Browser backup failed', error);
  }

  // Keep the former hosted-storage copy current when that API is available.
  try{
    if(window.storage && typeof window.storage.set === 'function'){
      await window.storage.set(key, value, SHARED);
    }
  }catch(error){
    console.warn('Previous shared-storage backup failed', error);
  }
}

async function loadStorageValue(key){
  try{
    const cloudValue = await readSupabaseValue(key);
    if(cloudValue !== null){
      await writeBrowserBackup(key, cloudValue);
      return cloudValue;
    }
  }catch(error){
    console.warn(`Cloud load failed for ${key}`, error);
    updateStorageStatus('local', error.message);
  }

  const legacyValue = await readLegacyValue(key);
  if(legacyValue !== null){
    // One-time migration: when Supabase has no row yet, copy the previous data
    // into the cloud without requiring the user to re-enter the song library.
    try{
      await writeSupabaseValue(key, legacyValue);
    }catch(error){
      console.warn(`Cloud migration failed for ${key}`, error);
      updateStorageStatus('local', error.message);
    }
    return legacyValue;
  }
  return null;
}

async function saveStorageValue(key, value){
  let cloudError = null;
  try{
    await writeSupabaseValue(key, value);
  }catch(error){
    cloudError = error;
    console.error(`Cloud save failed for ${key}`, error);
    updateStorageStatus('local', error.message);
  }

  await writeBrowserBackup(key, value);
  if(cloudError){
    // Keep the app usable if the device is temporarily offline. A later save
    // will write the complete current JSON back to Supabase.
    return false;
  }
  return true;
}

function songRowToModel(row){
  return {
    id:String(row.id),
    title:String(row.title || '').trim(),
    key:String(row.song_key || 'C'),
    body:String(row.body || ''),
    sourceFilename:row.source_filename || '',
    sourceFormat:row.source_format || 'manual',
    createdAt:row.created_at || '',
    updatedAt:row.updated_at || ''
  };
}

function songModelToRow(song, extra={}){
  return {
    title:String(song.title || '').trim(),
    song_key:String(song.key || 'C'),
    body:String(song.body || ''),
    source_filename:extra.sourceFilename !== undefined ? (extra.sourceFilename || null) : (song.sourceFilename || null),
    source_format:extra.sourceFormat || song.sourceFormat || 'manual'
  };
}

async function requestSongsTable(query='', options={}){
  const response = await fetch(supabaseSongsEndpoint(query), {
    method:options.method || 'GET',
    headers:{
      apikey:SUPABASE_PUBLISHABLE_KEY,
      Accept:'application/json',
      ...(options.body !== undefined ? {'Content-Type':'application/json'} : {}),
      ...(options.prefer ? {Prefer:options.prefer} : {})
    },
    body:options.body !== undefined ? JSON.stringify(options.body) : undefined,
    cache:'no-store'
  });
  if(!response.ok){
    const message = await response.text();
    throw new Error(`Songs table request failed (${response.status}): ${message}`);
  }
  updateStorageStatus('cloud');
  if(response.status === 204) return null;
  const text = await response.text();
  return text ? JSON.parse(text) : null;
}

async function fetchSongRows(){
  const rows = await requestSongsTable('?select=id,title,song_key,body,source_filename,source_format,created_at,updated_at&order=title.asc');
  return (rows || []).map(songRowToModel);
}

async function createSongRecord(song, extra={}){
  const rows = await requestSongsTable('?select=id,title,song_key,body,source_filename,source_format,created_at,updated_at', {
    method:'POST',
    prefer:'return=representation',
    body:songModelToRow(song, extra)
  });
  if(!rows || !rows[0]) throw new Error('Supabase did not return the newly created song.');
  return songRowToModel(rows[0]);
}

async function updateSongRecord(id, song, extra={}){
  const rows = await requestSongsTable(`?id=eq.${encodeURIComponent(id)}&select=id,title,song_key,body,source_filename,source_format,created_at,updated_at`, {
    method:'PATCH',
    prefer:'return=representation',
    body:songModelToRow(song, extra)
  });
  if(!rows || !rows[0]) throw new Error('The song could not be updated. It may have been removed on another device.');
  return songRowToModel(rows[0]);
}

async function deleteSongRecord(id){
  await requestSongsTable(`?id=eq.${encodeURIComponent(id)}`, {
    method:'DELETE',
    prefer:'return=minimal'
  });
}

async function insertSongRecords(songs){
  if(!songs.length) return [];
  const rows = await requestSongsTable('?select=id,title,song_key,body,source_filename,source_format,created_at,updated_at', {
    method:'POST',
    prefer:'return=representation',
    body:songs.map(song => songModelToRow(song, {
      sourceFilename:song.sourceFilename || '',
      sourceFormat:song.sourceFormat || 'chordpro'
    }))
  });
  return (rows || []).map(songRowToModel);
}

let legacySongIdMap = {};
let legacySongSnapshot = [];

async function readLegacySongLibrary(){
  const serialized = await loadStorageValue(STORAGE_KEY);
  if(serialized === null) return [];
  try{
    const parsed = JSON.parse(serialized);
    return Array.isArray(parsed) ? parsed : [];
  }catch(error){
    console.warn('Previous combined song library is not valid JSON', error);
    return [];
  }
}

function matchMigratedRowsToLegacy(legacySongs, insertedSongs){
  const unused = insertedSongs.slice();
  const map = {};
  legacySongs.forEach(oldSong => {
    let index = unused.findIndex(newSong =>
      newSong.title.trim().toLowerCase() === String(oldSong.title || '').trim().toLowerCase() &&
      newSong.body === String(oldSong.body || '')
    );
    if(index < 0){
      index = unused.findIndex(newSong =>
        newSong.title.trim().toLowerCase() === String(oldSong.title || '').trim().toLowerCase()
      );
    }
    if(index >= 0){
      const [matched] = unused.splice(index,1);
      map[String(oldSong.id)] = matched.id;
    }
  });
  return map;
}

async function migrateLegacySongsIfNeeded(){
  const existing = await fetchSongRows();
  if(existing.length) return existing;

  const legacy = await readLegacySongLibrary();
  legacySongSnapshot = legacy;
  if(!legacy.length) return [];

  const migrationRows = legacy
    .filter(song => String(song.title || '').trim())
    .map(song => ({
      title:String(song.title || '').trim(),
      key:String(song.key || 'C'),
      body:String(song.body || ''),
      sourceFilename:'',
      sourceFormat:'manual'
    }));
  const inserted = await insertSongRecords(migrationRows);
  legacySongIdMap = matchMigratedRowsToLegacy(legacy, inserted);
  return inserted.sort((a,b)=>a.title.localeCompare(b.title));
}

async function loadSongs(){
  try{
    return await migrateLegacySongsIfNeeded();
  }catch(error){
    console.error('Could not load the songs table', error);
    updateStorageStatus('local', error.message);
    // A read-only browser fallback keeps the current device usable if Supabase
    // is temporarily unavailable. Song edits require the cloud table.
    const legacy = await readLegacySongLibrary();
    legacySongSnapshot = legacy;
    return legacy.map(song => ({
      id:String(song.id), title:String(song.title || ''), key:String(song.key || 'C'), body:String(song.body || ''),
      sourceFilename:'', sourceFormat:'manual'
    }));
  }
}


function getUpcomingSunday(){
  const date = new Date();
  date.setHours(12,0,0,0);
  const daysUntilSunday = (7 - date.getDay()) % 7;
  date.setDate(date.getDate() + daysUntilSunday);
  return date;
}

function localDateKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function currentSundayDateKey(){ return localDateKey(getUpcomingSunday()); }

function sundayDateLabel(){
  return new Intl.DateTimeFormat(undefined, {
    weekday:'long', month:'long', day:'numeric'
  }).format(getUpcomingSunday());
}

async function loadSundaySetlist(){
  let parsed = null;
  const serialized = await loadStorageValue(SETLIST_STORAGE_KEY);
  if(serialized !== null){
    try{
      parsed = JSON.parse(serialized);
    }catch(error){
      console.error('Stored Sunday set is not valid JSON', error);
    }
  }

  const dateKey = currentSundayDateKey();
  if(Array.isArray(parsed)) return { sundayDate:dateKey, songIds:parsed, notes:{}, locked:false };
  if(!parsed || parsed.sundayDate !== dateKey || !Array.isArray(parsed.songIds)){
    return { sundayDate:dateKey, songIds:[], notes:{}, locked:false };
  }
  return {
    sundayDate: parsed.sundayDate,
    songIds: parsed.songIds,
    notes: parsed.notes && typeof parsed.notes === 'object' ? parsed.notes : {},
    locked: Boolean(parsed.locked)
  };
}

async function saveSundaySetlist(){
  const payload = JSON.stringify({
    sundayDate: currentSundayDateKey(),
    songIds: state.sundaySetlist,
    notes: state.setlistNotes,
    locked: state.setlistLocked
  });
  return saveStorageValue(SETLIST_STORAGE_KEY, payload);
}

      <div class="form-hint">
        Put each chord in brackets right before the syllable it belongs to, like <code>[G]Amazing</code>.

  `;
}


/* ============================= BULK CHORDPRO IMPORT ============================= */

const CHORDPRO_EXTENSIONS = new Set(['cho','chopro','chordpro','pro','crd','txt']);

function normalizeSongTitle(title){
  return String(title || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[’‘`]/g,"'")
    .toLowerCase()
    .replace(/&/g,' and ')
    .replace(/[^a-z0-9]+/g,' ')
    .trim()
    .replace(/\s+/g,' ');
}

function titleFromFilename(filename){
  return String(filename || '')
    .replace(/\.[^.]+$/,'')
    .replace(/[_]+/g,' ')
    .replace(/\s+-\s+/g,' - ')
    .replace(/\s+/g,' ')
    .trim();
}

function normalizeImportedKey(rawKey){
  const cleaned = normalizeMusicText(String(rawKey || '').trim())
    .replace(/^key\s*[:=-]?\s*/i,'');
  const match = cleaned.match(/^([A-Ga-g])([#b]?)(m|min|minor)?/);
  if(!match) return { key:'', warning:'' };
  const key = match[1].toUpperCase() + (match[2] || '');
  return {
    key:NOTE_INDEX[key] === undefined ? '' : PREFERRED_NAME[NOTE_INDEX[key]],
    warning:match[3] ? `The file declares ${match[0]} as a minor key; the app currently stores its root as ${key}.` : ''
  };
}

function chordProSectionName(name, value=''){
  const directive = String(name || '').toLowerCase().replace(/-/g,'_');
  const map = {
    start_of_chorus:'Chorus', soc:'Chorus', chorus:'Chorus',
    start_of_verse:'Verse', sov:'Verse', verse:'Verse',
    start_of_bridge:'Bridge', sob:'Bridge', bridge:'Bridge',
    start_of_intro:'Intro', soi:'Intro', intro:'Intro',
    start_of_outro:'Outro', soo:'Outro', outro:'Outro',
    start_of_prechorus:'Pre-Chorus', start_of_pre_chorus:'Pre-Chorus', sopc:'Pre-Chorus', prechorus:'Pre-Chorus',
    start_of_interlude:'Interlude', interlude:'Interlude',
    start_of_tag:'Tag', tag:'Tag',
    start_of_refrain:'Refrain', refrain:'Refrain'
  };
  if(map[directive]){
    if(!value) return map[directive];
    return value.toLowerCase().startsWith(map[directive].toLowerCase()) ? value : `${map[directive]} ${value}`.trim();
  }
  return '';
}

function isChordProEndDirective(name){
  const n = String(name || '').toLowerCase().replace(/-/g,'_');
  return n.startsWith('end_of_') || ['eoc','eov','eob','eoi','eoo','eopc','end_of_grid','eog'].includes(n);
}

function parseChordProFileText(rawText, filename=''){
  const normalized = normalizeMusicText(String(rawText || ''))
    .replace(/^\uFEFF/,'')
    .replace(/\r\n?/g,'\n');
  const lines = normalized.split('\n');
  const bodyLines = [];
  const warnings = [];
  const ignoredDirectives = [];
  let title = '';
  let key = '';
  let inTabBlock = false;

  for(const originalLine of lines){
    const line = originalLine.replace(/\t/g,'    ');
    const trimmed = line.trim();
    const exactDirective = trimmed.match(/^\{\s*([^}:]+?)\s*(?::\s*(.*?))?\s*\}$/);

    if(exactDirective){
      const rawName = exactDirective[1].trim();
      const name = rawName.toLowerCase().replace(/\s+/g,'_').replace(/-/g,'_');
      const value = (exactDirective[2] || '').trim();

      if(['title','t'].includes(name)){ title = value || title; continue; }
      if(['key','k'].includes(name)){
        const normalizedKey = normalizeImportedKey(value);
        key = normalizedKey.key || key;
        if(normalizedKey.warning) warnings.push(normalizedKey.warning);
        continue;
      }
      if(['start_of_tab','sot'].includes(name)){ inTabBlock = true; continue; }
      if(['end_of_tab','eot'].includes(name)){ inTabBlock = false; continue; }
      if(isChordProEndDirective(name)) continue;

      const section = chordProSectionName(name, value);
      if(section){ bodyLines.push(`{${section}}`); continue; }

      if(['comment','c','comment_italic','ci','comment_box','cb'].includes(name)){
        if(value){
          const cleanedSection = getSectionLabel(value) || value.replace(/^\[|\]$/g,'').trim();
          bodyLines.push(`{${cleanedSection}}`);
        }
        continue;
      }

      if(['new_page','np','column_break','colb','new_song','ns'].includes(name)){
        if(bodyLines.length && bodyLines[bodyLines.length-1] !== '') bodyLines.push('');
        continue;
      }

      // Metadata and rendering directives do not belong in the chord sheet.
      if([
        'subtitle','st','artist','composer','lyricist','copyright','album','year','tempo','time','duration','capo',
        'meta','define','textfont','textsize','chordfont','chordsize','grid','no_grid','columns','col','start_of_grid','sog'
      ].includes(name)){
        ignoredDirectives.push(rawName);
        continue;
      }

      // Preserve unfamiliar directives as a warning instead of rendering code into the song.
      ignoredDirectives.push(rawName);
      continue;
    }

    if(inTabBlock){
      if(trimmed) bodyLines.push(line);
      continue;
    }

    // Many downloaded ChordPro/text files use plain section headings such as
    // "Verse 1", "Chorus", or "Bridge" instead of {start_of_...}
    // directives. Convert those headings before preserving the lyric line.
    const plainSection = getSectionLabel(trimmed);
    if(plainSection){
      bodyLines.push(`{${plainSection}}`);
      continue;
    }

    // ChordPro's native [Chord]lyric syntax is already the app's preferred syntax.
    bodyLines.push(line.replace(/\\\[/g,'[').replace(/\\\]/g,']'));
  }

  let body = bodyLines
    .join('\n')
    .replace(/[ \t]+$/gm,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();

  // Some .txt/.pro downloads are ordinary website charts rather than strict
  // ChordPro. Reuse the proven paste parser when no bracket chords were found.
  if(!/\[[A-G][^\]]*\]/i.test(body)){
    const fallback = formatPastedChordSheet(normalized);
    if(fallback.body && fallback.chordCount){
      body = fallback.body;
      if(!title && fallback.title) title = fallback.title;
      if(!key && fallback.key) key = fallback.key;
      warnings.push('This file was imported as an aligned text chord chart rather than strict ChordPro.');
    }
  }

  const chordSymbols = [...body.matchAll(/\[([^\]]+)\]/g)]
    .map(match => match[1].trim())
    .filter(isChordToken);
  if(!key) key = inferKeyFromChords(chordSymbols) || 'C';
  if(!title) title = titleFromFilename(filename);

  if(ignoredDirectives.length){
    const unique = [...new Set(ignoredDirectives)].slice(0,8);
    warnings.push(`Ignored ${unique.length} non-song directive${unique.length===1?'':'s'}: ${unique.join(', ')}${ignoredDirectives.length>8?'…':''}`);
  }
  if(!chordSymbols.length) warnings.push('No recognizable bracketed chords were found. Review the preview before importing.');

  return {
    title:title.trim(),
    key:key || 'C',
    body,
    chordCount:chordSymbols.length,
    warnings
  };
}

function getBulkDuplicate(item, index){
  const normalized = normalizeSongTitle(item.title);
  if(!normalized) return null;
  const existing = state.songs.find(song => normalizeSongTitle(song.title) === normalized);
  if(existing) return { type:'existing', id:existing.id, title:existing.title };
  const earlier = state.bulkFiles.find((other, otherIndex) =>
    otherIndex < index && other.parseStatus !== 'error' && normalizeSongTitle(other.title) === normalized
  );
  if(earlier) return { type:'batch', tempId:earlier.tempId, title:earlier.title };
  return null;
}

function refreshBulkDuplicates(){
  state.bulkFiles.forEach((item,index)=>{
    item.duplicate = getBulkDuplicate(item,index);
    if(item.duplicate){
      const allowed = item.duplicate.type === 'existing' ? ['skip','replace','copy'] : ['skip','copy'];
      if(!allowed.includes(item.duplicateAction)) item.duplicateAction = 'skip';
    }else{
      item.duplicateAction = 'import';
    }
  });
}

function bulkItemCanImport(item){
  if(!item.selected || item.parseStatus === 'error' || !item.title.trim() || !item.body.trim()) return false;
  if(item.duplicate && item.duplicateAction === 'skip') return false;
  return true;
}

function bulkReviewCounts(){
  const total = state.bulkFiles.length;
  const errors = state.bulkFiles.filter(item=>item.parseStatus==='error').length;
  const duplicates = state.bulkFiles.filter(item=>item.duplicate).length;
  const selected = state.bulkFiles.filter(bulkItemCanImport).length;
  return { total, errors, duplicates, selected };
}

function renderBulkCard(item,index){
  const duplicate = item.duplicate;
  const isError = item.parseStatus === 'error';
  const warnings = item.warnings || [];
  let duplicateControl = '<span>No duplicate found</span>';
  if(duplicate){
    const replaceOption = duplicate.type === 'existing'
      ? `<option value="replace" ${item.duplicateAction==='replace'?'selected':''}>Replace existing song</option>`
      : '';
    duplicateControl = `
      <select onchange="updateBulkDuplicateAction('${item.tempId}',this.value)">
        <option value="skip" ${item.duplicateAction==='skip'?'selected':''}>Skip duplicate</option>
        ${replaceOption}
        <option value="copy" ${item.duplicateAction==='copy'?'selected':''}>Import another copy</option>
      </select>`;
  }

  const statusText = isError
    ? `<strong class="error-text">Could not parse</strong><span class="error-text">${escapeHtml(item.error || 'Unknown file error')}</span>`
    : `<strong>${item.chordCount} chord${item.chordCount===1?'':'s'} detected</strong>
       ${duplicate ? `<span class="warning-text">Matches ${duplicate.type==='existing'?'library song':'another selected file'} “${escapeHtml(duplicate.title)}”.</span>` : '<span>Ready for review.</span>'}
       ${warnings.map(w=>`<span class="warning-text" style="display:block;margin-top:3px;">${escapeHtml(w)}</span>`).join('')}`;

  return `
    <div class="bulk-card ${isError?'error':(duplicate||warnings.length?'warning':'')}" data-bulk-card="${item.tempId}">
      <div class="bulk-check"><input type="checkbox" ${item.selected&&!isError?'checked':''} ${isError?'disabled':''} onchange="toggleBulkItem('${item.tempId}',this.checked)" aria-label="Include ${escapeAttr(item.filename)}"></div>
      <div class="bulk-field">
        <label>Song title</label>
        <input value="${escapeAttr(item.title)}" ${isError?'disabled':''} onchange="updateBulkField('${item.tempId}','title',this.value)">
        <div class="bulk-file-name">${escapeHtml(item.filename)}</div>
      </div>
      <div class="bulk-field">
        <label>Key</label>
        <select ${isError?'disabled':''} onchange="updateBulkField('${item.tempId}','key',this.value)">
          ${ALL_KEYS.map(key=>`<option value="${key}" ${item.key===key?'selected':''}>${key}</option>`).join('')}
        </select>
      </div>
      <div class="bulk-field">
        <label>${duplicate?'Duplicate action':'Status'}</label>
        ${duplicate ? duplicateControl : `<div class="bulk-status" style="padding-top:8px;">${statusText}</div>`}
      </div>
      ${duplicate ? `<div class="bulk-status" style="grid-column:2 / -1;padding-top:0;">${statusText}</div>` : ''}
      ${!isError ? `<details class="bulk-card-details">
        <summary>Preview or correct converted chords and lyrics</summary>
        <textarea class="bulk-preview-body" oninput="updateBulkField('${item.tempId}','body',this.value)">${escapeHtml(item.body)}</textarea>
      </details>` : ''}
    </div>`;
}

function cancelBulkImport(){

  state.view = 'library';

  render();
